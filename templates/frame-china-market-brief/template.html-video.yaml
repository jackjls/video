spec_version: 1
id: frame-china-market-brief
name: China Market Brief
description: >
  Dark Chinese financial briefing frame with blue/cyan data-grid styling,
  animated market cards, sparklines, scanlines, and a professional morning-news tone.

engine: hyperframes
engine_version: ^0.4.0
source_entry: index.html

category: data-viz
subcategory: market-brief
tags: [finance, market, china, briefing, data, stocks, news, cards, chart, chinese]

best_for:
  - "财经早报 / 市场快讯"
  - "A股、港股、美股、商品行情分镜"
  - "多页金融解读视频"
  - "券商观点、行业机会、重点标的"

not_for:
  - "Lifestyle vlogs"
  - "Pure cinematic scenes"
  - "Math-heavy technical explainers"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1080, height: 1350 }
    supported_aspects: ["4:5", "9:16", "1:1"]
  fps:
    default: 60
    supported: [30, 60]
  duration:
    type: variable
    min_sec: 4
    max_sec: 12
    default_sec: 7
  alpha: false
  audio:
    supported: true
    expected_inputs: [narration, bgm]

inputs:
  schema:
    type: object
    required: [headline]
    properties:
      brand:
        type: string
        maxLength: 24
        description: "Top-left Chinese brand/title"
      brand_sub:
        type: string
        maxLength: 32
        description: "Top-left English or category sublabel"
      date:
        type: string
        maxLength: 24
        description: "Date or session label"
      kicker:
        type: string
        maxLength: 40
        description: "Section label such as A股 / COMMODITIES"
      headline:
        type: string
        maxLength: 32
        description: "Main frame headline"
      subhead:
        type: string
        maxLength: 80
        description: "One-line summary"
      cards:
        type: array
        minItems: 1
        maxItems: 4
        items:
          type: object
          required: [name, value]
          properties:
            name: { type: string, maxLength: 18 }
            label: { type: string, maxLength: 24 }
            value: { type: string, maxLength: 24 }
            unit: { type: string, maxLength: 20 }
            change: { type: string, maxLength: 16 }
            direction:
              type: string
              enum: [up, down, neutral]
      foot_left:
        type: string
        maxLength: 40
      foot_right:
        type: string
        maxLength: 16
      duration_sec:
        type: number
        minimum: 4
        maximum: 12
        default: 7
  examples:
    - brand: "财经早报"
      brand_sub: "MORNING MARKETS"
      date: "2026 · 06 · 05"
      kicker: "A股 · MARKET"
      headline: "A股震荡调整"
      subhead: "主要指数普遍走弱，仅科创50逆势翻红"
      cards:
        - { name: "上证指数", label: "SHCOMP", value: "3310.44", unit: "点", change: "-0.64%", direction: down }
        - { name: "科创50", label: "STAR 50", value: "1012.88", unit: "点", change: "+0.69%", direction: up }
        - { name: "两市成交", label: "TURNOVER", value: "2.76", unit: "万亿", change: "缩量3700亿", direction: neutral }
      foot_left: "数据来源 · 早间快讯"
      foot_right: "02 / 08"
      duration_sec: 7

license:
  spdx: Apache-2.0
  attribution_required: false
  redistribution_allowed: true
  commercial_use: true
  notes: "Derived from a locally generated html-video project style and generalized into a reusable template."

author:
  name: nexu-io
  url: https://github.com/nexu-io
  contact: open-design@nexu.io

version: 0.1.0
changelog:
  - version: 0.1.0
    date: 2026-06-05
    notes: Generalized from the latest local 8-frame China finance briefing video.

preview:
  poster: poster.svg

performance:
  reference_render:
    duration_sec: 7
    render_wall_clock_sec: 10
    machine: "local"
